<!doctype html>
<html>
<body>
<h1>Edit Item</h1>
<form method="post" action="/items/{{ item_id }}/edit">
<input type="hidden" name="authenticity_token" value="{{ edit_token }}">
<label>Item name <input type="text" name="name" required maxlength="120" value="{{ name }}"></label><br>
<label>Description <textarea name="description" maxlength="500">{{ description }}</textarea></label><br>
<label>Price (cents, e.g. 1250 = €12.50) <input type="number" name="price_cents" required min="0" max="999999" value="{{ price_cents }}"></label><br>
<button type="submit">Save Changes</button>
</form>
<div>
<form method="post" action="/items/{{ item_id }}/toggle" style="display:inline">
<input type="hidden" name="authenticity_token" value="{{ toggle_token }}">
<button type="submit">{% if is_available %}Mark Unavailable{% else %}Mark Available{% endif %}</button>
</form>
<form method="post" action="/items/{{ item_id }}/delete" style="display:inline">
<input type="hidden" name="authenticity_token" value="{{ delete_token }}">
<button type="submit">Delete Item</button>
</form>
</div>
<h2>Photo</h2>
{% match photo_url %}
{% when Some(url) %}
<p>Current photo: <img src="{{ url }}" alt="Item photo" style="max-width:200px"></p>
{% when None %}
<p>No photo set.</p>
{% endmatch %}
<form method="post" action="/items/{{ item_id }}/photo" enctype="multipart/form-data">
<input type="hidden" name="authenticity_token" value="{{ photo_token }}">
<label>Upload photo <input type="file" name="photo" accept="image/*" required></label><br>
<button type="submit">Upload Photo</button>
</form>
<p><a href="/categories/{{ category_id }}/items">Back to items</a></p>
</body>
</html>
